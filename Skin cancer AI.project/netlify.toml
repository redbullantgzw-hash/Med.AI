# Netlify Configuration (inner — ใช้ร่วมกับ root netlify.toml)
# Functions v2 ใช้ config.path จัดการ route โดยตรง ไม่ต้องใช้ redirects

[build]
  command = "echo 'Building...'"
  functions = "netlify/functions"
  publish = "."

# Custom Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[functions]
  node_bundler = "esbuild"
